services:
  buscador-dtic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buscador-dtic
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
